<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facturi Familie</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0a1235;
  color:white;
}

.app {
  max-width:460px;
  margin:auto;
  padding:16px;
}

h1 { text-align:center; }

.summary {
  display:flex;
  justify-content:space-between;
  margin:10px 0;
}

.box {
  flex:1;
  margin:4px;
  padding:10px;
  border-radius:12px;
  text-align:center;
  background:#1f274f;
}

.total {
  background:#14205a;
  padding:10px;
  border-radius:12px;
  margin-bottom:10px;
}

.filters {
  display:flex;
  gap:6px;
  margin-bottom:10px;
}

button {
  flex:1;
  padding:8px;
  border:none;
  border-radius:10px;
  background:#1f274f;
  color:white;
}

button.active {
  background:#4c6fff;
}

.card {
  padding:12px;
  border-radius:14px;
  margin-bottom:10px;
}

.paid { background:#134d3a; }
.soon { background:#6b4f12; }
.overdue { background:#6b1f2a; }
</style>
</head>

<body>
<div class="app">

<h1>Facturi Familie</h1>

<div class="summary">
  <div class="box">Plătite<br><b id="paidCount">0</b></div>
  <div class="box">Curând<br><b id="soonCount">0</b></div>
  <div class="box">Restante<br><b id="overdueCount">0</b></div>
</div>

<div class="total">
  💰 Plătit: <b id="totalPaid">0</b><br>
  ❗ De plată: <b id="totalUnpaid">0</b>
</div>

<div class="filters">
  <button onclick="setFilter('all')" class="active">Toate</button>
  <button onclick="setFilter('Petrica')">Petrica</button>
  <button onclick="setFilter('Anca')">Anca</button>
  <button onclick="setFilter('unpaid')">Neplătite</button>
</div>

<div id="content">Se încarcă...</div>

</div>

<script>
const API_URL = "https://familie-plati-app-ce8l.vercel.app/api/payments";
let allBills = [];
let currentFilter = "all";

function daysUntil(d){
  if(!d) return null;
  const date = new Date(d);
  const today = new Date();
  today.setHours(0,0,0,0);
  date.setHours(0,0,0,0);
  return Math.ceil((date-today)/(1000*60*60*24));
}

function status(b){
  const diff = daysUntil(b.DataScadenta);

  if(b.Platita) return "paid";
  if(diff < 0) return "overdue";
  if(diff <=5) return "soon";
  return "";
}

function render(){
  let bills = [...allBills];

  if(currentFilter==="Petrica")
    bills = bills.filter(b=>b.Persoana==="Petrica");

  if(currentFilter==="Anca")
    bills = bills.filter(b=>b.Persoana==="Anca");

  if(currentFilter==="unpaid")
    bills = bills.filter(b=>!b.Platita);

  document.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
  event?.target?.classList.add("active");

  // totals
  const paid = allBills.filter(b=>b.Platita);
  const unpaid = allBills.filter(b=>!b.Platita);

  document.getElementById("totalPaid").textContent =
    paid.reduce((s,b)=>s+b.Suma,0);

  document.getElementById("totalUnpaid").textContent =
    unpaid.reduce((s,b)=>s+b.Suma,0);

  document.getElementById("paidCount").textContent = paid.length;
  document.getElementById("overdueCount").textContent =
    unpaid.filter(b=>daysUntil(b.DataScadenta)<0).length;

  document.getElementById("soonCount").textContent =
    unpaid.filter(b=>{
      const d=daysUntil(b.DataScadenta);
      return d>=0 && d<=5;
    }).length;

  let html="";

  bills.forEach(b=>{
    html+=`
    <div class="card ${status(b)}">
      <b>${b.TipPlata}</b><br>
      ${b.Persoana}<br>
      ${b.Furnizor}<br>
      ${b.DataScadenta}<br>
      ${b.Suma}
    </div>`;
  });

  document.getElementById("content").innerHTML = html;
}

function setFilter(f){
  currentFilter = f;
  render();
}

fetch(API_URL)
.then(r=>r.json())
.then(d=>{
  allBills = d;
  render();
});
</script>

</body>
</html>
