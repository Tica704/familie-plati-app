<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Facturi Familie</title>
  <link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a1235">
<link rel="apple-touch-icon" href="/icon-192.png">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #0a1235 0%, #111d52 100%);
      color: white;
    }

    .app {
      max-width: 460px;
      margin: auto;
      padding: 16px 16px 30px;
    }

    h1 {
      text-align: center;
      margin-bottom: 12px;
    }

    .summary {
      display: flex;
      justify-content: space-between;
      margin: 12px 0;
    }

    .box {
      flex: 1;
      margin: 4px;
      padding: 12px;
      border-radius: 14px;
      text-align: center;
      background: rgba(255,255,255,0.08);
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin: 0 auto 6px;
    }

    .green { background:#29d17d; }
    .yellow { background:#f4c542; }
    .red { background:#ff6b6b; }

    .total {
      background: rgba(255,255,255,0.08);
      padding: 12px;
      border-radius: 14px;
      margin-bottom: 10px;
      line-height: 1.6;
    }

    .filters {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    button.filter-btn,
    button.action-btn {
      border: none;
      border-radius: 10px;
      color: white;
      cursor: pointer;
    }

    button.filter-btn {
      flex: 1;
      padding: 8px;
      background: #1f274f;
    }

    button.filter-btn.active {
      background: #4c6fff;
    }

    .card {
      padding: 14px;
      border-radius: 16px;
      margin-bottom: 12px;
    }

    .paid { background:#134d3a; }
    .soon { background:#6b4f12; }
    .overdue { background:#6b1f2a; }

    .icon {
      font-size: 20px;
      margin-right: 6px;
    }

    .meta {
      margin-top: 8px;
      opacity: 0.85;
      font-size: 14px;
      line-height: 1.5;
    }

    .status {
      margin-top: 8px;
      font-weight: bold;
    }

    .action-row {
      margin-top: 10px;
      display: flex;
      gap: 8px;
    }

    .action-btn {
      padding: 10px 12px;
      font-weight: bold;
      flex: 1;
      transition: 0.2s ease;
    }

    /* Neplatit -> ROZ */
    .btn-paid {
      background: #ffb3b3;
      color: #4c0912;
    }

    /* Platit -> VERDE */
    .btn-unpaid {
      background: #29d17d;
      color: #052312;
    }

    .action-btn:active {
      transform: scale(0.98);
    }

    .user-box {
      background: rgba(255,255,255,0.08);
      padding: 12px;
      border-radius: 14px;
      margin-bottom: 12px;
    }

    select {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      margin-top: 8px;
      font-size: 14px;
    }

    .loading,
    .error-box,
    .empty-box {
      background: rgba(255,255,255,0.08);
      padding: 14px;
      border-radius: 14px;
      text-align: center;
      margin-top: 10px;
    }

    .error-box {
      color: #ffd4d4;
    }
  </style>
</head>

<body>
<div class="app">

  <h1>Facturi Familie</h1>

  <div class="user-box">
    Cine face modificarea?
    <select id="userSelect">
      <option value="Petrica">Petrica</option>
      <option value="Anca">Anca</option>
    </select>
  </div>

  <div class="summary">
    <div class="box">
      <div class="dot green"></div>
      Plătite<br><b id="paidCount">0</b>
    </div>
    <div class="box">
      <div class="dot yellow"></div>
      Curând<br><b id="soonCount">0</b>
    </div>
    <div class="box">
      <div class="dot red"></div>
      Restante<br><b id="overdueCount">0</b>
    </div>
  </div>

  <div class="total">
    💰 Plătit: <b id="totalPaid">0</b><br>
    ❗ De plată: <b id="totalUnpaid">0</b>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', event)">Toate</button>
    <button class="filter-btn" onclick="setFilter('Petrica', event)">Petrica</button>
    <button class="filter-btn" onclick="setFilter('Anca', event)">Anca</button>
    <button class="filter-btn" onclick="setFilter('unpaid', event)">Neplătite</button>
  </div>

  <div id="content" class="loading">Se încarcă...</div>

</div>

<script>
const API_URL = "https://familie-plati-app-ce8l.vercel.app/api/payments";
const SCRIPT_URL = "https://familie-plati-app-ce8l.vercel.app/api/payments";

let allBills = [];
let currentFilter = "all";

function icon(tip){
  tip = (tip || "").toLowerCase();

  if (tip.includes("gaz")) return "🔥";
  if (tip.includes("energie")) return "💡";
  if (tip.includes("banca")) return "🏦";
  if (tip.includes("chirie")) return "🏠";
  if (tip.includes("internet")) return "🌐";
  if (tip.includes("telefon")) return "📱";
  if (tip.includes("paypal")) return "💳";

  return "📄";
}

function days(d){
  if (!d) return null;

  const date = new Date(d);
  if (isNaN(date)) return null;

  const today = new Date();
  today.setHours(0,0,0,0);
  date.setHours(0,0,0,0);

  return Math.ceil((date - today)/(1000*60*60*24));
}

function statusClass(b){
  const diff = days(b.DataScadenta);

  if (b.Platita) return "paid";
  if (diff !== null && diff < 0) return "overdue";
  if (diff !== null && diff <= 5) return "soon";

  return "";
}

function statusText(b){
  const diff = days(b.DataScadenta);

  if (b.Platita) return "✅ Plătită";
  if (diff !== null && diff < 0) return "🔴 Restantă";
  if (diff !== null && diff <= 5) return "🟡 Scadență curând";

  return "🕒 În așteptare";
}

function formatDate(value){
  if (!value) return "-";

  const d = new Date(value);
  if (isNaN(d)) return value;

  return d.toLocaleDateString("ro-RO");
}

function render(){
  let bills = [...allBills];

  if (currentFilter === "Petrica") {
    bills = bills.filter(b => b.Persoana === "Petrica");
  }

  if (currentFilter === "Anca") {
    bills = bills.filter(b => b.Persoana === "Anca");
  }

  if (currentFilter === "unpaid") {
    bills = bills.filter(b => !b.Platita);
  }

  const paid = allBills.filter(b => b.Platita);
  const unpaid = allBills.filter(b => !b.Platita);

  document.getElementById("totalPaid").textContent =
    paid.reduce((s, b) => s + Number(b.Suma || 0), 0);

  document.getElementById("totalUnpaid").textContent =
    unpaid.reduce((s, b) => s + Number(b.Suma || 0), 0);

  document.getElementById("paidCount").textContent = paid.length;

  document.getElementById("overdueCount").textContent =
    unpaid.filter(b => {
      const d = days(b.DataScadenta);
      return d !== null && d < 0;
    }).length;

  document.getElementById("soonCount").textContent =
    unpaid.filter(b => {
      const d = days(b.DataScadenta);
      return d !== null && d >= 0 && d <= 5;
    }).length;

  if (!bills.length) {
    document.getElementById("content").innerHTML =
      `<div class="empty-box">Nu există facturi pentru filtrul selectat.</div>`;
    return;
  }

  let html = "";

  bills.forEach(b => {
    html += `
      <div class="card ${statusClass(b)}">
        <b><span class="icon">${icon(b.TipPlata)}</span>${b.TipPlata}</b>
        <div class="meta">
          Persoană: ${b.Persoana || "-"}<br>
          Furnizor: ${b.Furnizor || "-"}<br>
          Scadență: ${formatDate(b.DataScadenta)}<br>
          Sumă: ${b.Suma || 0}<br>
          Metodă: ${b.Metoda || "-"}<br>
          Ultima actualizare: ${b.ActualizatDe || "-"} · ${b.ActualizatLa ? formatDate(b.ActualizatLa) : "-"}
        </div>
        <div class="status">${statusText(b)}</div>
        <div class="action-row">
          ${
            b.Platita
              ? `<button class="action-btn btn-unpaid" onclick="togglePaid('${b.ID}', false)">Plată efectuată</button>`
              : `<button class="action-btn btn-paid" onclick="togglePaid('${b.ID}', true)">Marchează plătit</button>`
          }
        </div>
      </div>
    `;
  });

  document.getElementById("content").innerHTML = html;
}

function setFilter(f, e){
  currentFilter = f;

  document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.classList.remove("active");
  });

  if (e && e.target) {
    e.target.classList.add("active");
  }

  render();
}

async function loadBills(){
  try {
    document.getElementById("content").innerHTML =
      `<div class="loading">Se încarcă...</div>`;

    const res = await fetch(API_URL, { cache: "no-store" });

    if (!res.ok) {
      const text = await res.text();
      throw new Error("HTTP " + res.status + " - " + text);
    }

    allBills = await res.json();
    render();
  } catch (err) {
    document.getElementById("content").innerHTML =
      `<div class="error-box">Eroare la încărcare: ${err.message}</div>`;
  }
}

async function togglePaid(id, newValue){
  const user = document.getElementById("userSelect").value;

  try {
    const res = await fetch(SCRIPT_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        id: id,
        platita: newValue,
        user: user
      })
    });

    const data = await res.json();

    if (!data.success) {
      alert("Eroare la salvare: " + (data.error || "necunoscută"));
      return;
    }

    await loadBills();
  } catch (err) {
    alert("Eroare: " + err.message);
  }
}

loadBills();
</script>
</body>
</html>
