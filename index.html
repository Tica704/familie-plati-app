<!DOCTYPE html>
<html lang="ro">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Facturi Familie</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0a1235;
  color:white;
}

.app {
  max-width:460px;
  margin:auto;
  padding-bottom:80px;
}

/* HEADER */
.header {
  text-align:center;
  padding:15px;
}

/* TABS */
.tabs {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  background:#111a44;
}

.tab {
  flex:1;
  padding:12px;
  text-align:center;
  color:#aaa;
}

.tab.active {
  color:white;
  background:#1d2a6b;
}

/* CARDS */
.card {
  margin:10px;
  padding:14px;
  border-radius:14px;
}

.paid { background:#134d3a; }
.soon { background:#6b4f12; }
.overdue { background:#6b1f2a; }

button {
  padding:8px;
  border:none;
  border-radius:8px;
  margin-top:8px;
}

/* SCREENS */
.screen { display:none; }
.screen.active { display:block; }

.stat {
  margin:10px;
  padding:12px;
  background:#1f274f;
  border-radius:12px;
}
</style>
</head>

<body>
<div class="app">

<div class="header">
<h2>Facturi Familie</h2>
</div>

<!-- HOME -->
<div id="home" class="screen active"></div>

<!-- STATS -->
<div id="stats" class="screen"></div>

<!-- HISTORY -->
<div id="history" class="screen"></div>

</div>

<!-- TABS -->
<div class="tabs">
<div class="tab active" onclick="showTab('home', this)">🏠</div>
<div class="tab" onclick="showTab('stats', this)">📊</div>
<div class="tab" onclick="showTab('history', this)">🕘</div>
</div>

<script>
const API_URL = "https://familie-plati-app-ce8l.vercel.app/api/payments";
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxj1DAI63rLUoVmNawDnY85rSe90AKKx9-9-TRRJ9m6yBeZ6X1VjfCXf2RrB0Q9tQ57/exec";

let data = [];

function showTab(id, el){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
}

function days(d){
  const date=new Date(d);
  const today=new Date();
  today.setHours(0,0,0,0);
  date.setHours(0,0,0,0);
  return Math.ceil((date-today)/(1000*60*60*24));
}

function status(b){
  if(b.Platita) return "paid";
  if(days(b.DataScadenta)<0) return "overdue";
  if(days(b.DataScadenta)<=5) return "soon";
  return "";
}

function renderHome(){
  let html="";
  data.forEach(b=>{
    html+=`
    <div class="card ${status(b)}">
      <b>${b.TipPlata}</b><br>
      ${b.Suma} lei<br>
      ${b.Persoana}<br>
      ${b.DataScadenta}<br>

      <button onclick="toggle('${b.ID}', ${!b.Platita})">
      ${b.Platita ? "Anulează" : "Plătit"}
      </button>
    </div>`;
  });
  document.getElementById("home").innerHTML=html;
}

function renderStats(){
  let totalPaid=0;
  let totalUnpaid=0;
  let p=0,a=0;

  data.forEach(b=>{
    if(b.Platita){
      totalPaid+=b.Suma;
      if(b.Persoana==="Petrica") p+=b.Suma;
      else a+=b.Suma;
    } else totalUnpaid+=b.Suma;
  });

  document.getElementById("stats").innerHTML=`
  <div class="stat">Total plătit: ${totalPaid}</div>
  <div class="stat">Restant: ${totalUnpaid}</div>
  <div class="stat">Petrica: ${p}</div>
  <div class="stat">Anca: ${a}</div>
  `;
}

function renderHistory(){
  let html="";
  data.filter(b=>b.Platita).forEach(b=>{
    html+=`
    <div class="card paid">
      ${b.TipPlata} - ${b.Suma}<br>
      ${b.ActualizatDe} - ${b.ActualizatLa}
    </div>`;
  });
  document.getElementById("history").innerHTML=html;
}

async function toggle(id, val){
  await fetch(SCRIPT_URL,{
    method:"POST",
    body:JSON.stringify({
      id:id,
      platita:val,
      user:"App"
    })
  });
  load();
}

async function load(){
  const r=await fetch(API_URL);
  data=await r.json();
  renderHome();
  renderStats();
  renderHistory();
}

load();
</script>

</body>
</html>
